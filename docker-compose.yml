services:
  openclaw-admin:
    build: .
    container_name: openclaw-admin
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      OPENCLAW_CONFIG_DIR: /data/openclaw-config
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-../openclaw-deploy/config}:/data/openclaw-config
      # Mount agent workspaces at the same paths the gateway config references
      - ../openclaw-deploy/workspaces/user-a:/home/node/.openclaw/workspace-a
      - ../openclaw-deploy/workspaces/user-b:/home/node/.openclaw/workspace-b
    ports:
      - "18800:3000"
    init: true
    restart: unless-stopped
